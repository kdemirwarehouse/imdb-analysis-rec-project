name: Python CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Kontrol et
        run: |
          python --version
          pip list
